kind = "web"
previewPath = "/"
title = "swissTax"
version = "1.0.0"
id = "artifacts/swiss-tax"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24358

[services.development]
run = "pnpm --filter @workspace/swiss-tax run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/swiss-tax", "run", "build" ]
publicDir = "artifacts/swiss-tax/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24358"
BASE_PATH = "/"
